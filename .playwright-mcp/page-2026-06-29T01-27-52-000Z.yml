  - generic [ref=e12]:
    - text: Security & Compliance
    - heading "Enterprise-grade security for your compliance data" [level=1] [ref=e13]
    - paragraph [ref=e14]: Spire is built to meet the same security standards we help our customers achieve. Our platform undergoes annual SOC 2 Type II audits, follows EU AI Act governance requirements, and encrypts all data in transit and at rest.
    - generic [ref=e15]:
      - generic [ref=e16]:
        - heading "SOC 2 Type II Certified" [level=2] [ref=e17]
        - paragraph [ref=e18]: Annual SOC 2 Type II audit covering the Security trust service criterion. Our report is available to customers under NDA. Controls are continuously monitored via automated evidence collection across our entire infrastructure.
        - list [ref=e19]:
          - listitem [ref=e20]: Annual re-certification cycle
          - listitem [ref=e22]: Continuous control monitoring
          - listitem [ref=e24]: Auditor-ready evidence library
          - listitem [ref=e26]: SOC 2 report available on request
      - generic [ref=e28]:
        - heading "EU AI Act Aligned" [level=2] [ref=e29]
        - paragraph [ref=e30]: Our AI compliance agent and internal AI governance framework align with EU AI Act requirements including Article 4 AI literacy, Article 50 transparency, and GPAI Code of Practice documentation standards.
        - list [ref=e31]:
          - listitem [ref=e32]: Documented AI governance policies
          - listitem [ref=e34]: Zero data retention on AI processing
          - listitem [ref=e36]: AI transparency disclosures
          - listitem [ref=e38]: ISO 42001-ready framework
      - generic [ref=e40]:
        - heading "Data Encryption" [level=2] [ref=e41]
        - paragraph [ref=e42]: All customer data is encrypted at rest using AES-256 and in transit using TLS 1.3. API keys and secrets are stored using Cloudflare Workers Secrets with automatic rotation.
        - list [ref=e43]:
          - listitem [ref=e44]: AES-256 encryption at rest
          - listitem [ref=e46]: TLS 1.3 in transit
          - listitem [ref=e48]: Zero data retention with AI providers
          - listitem [ref=e50]: Secrets encrypted at rest
      - generic [ref=e52]:
        - heading "Infrastructure Security" [level=2] [ref=e53]
        - paragraph [ref=e54]: Spire runs on Cloudflare Workers with data stored in Neon PostgreSQL on AWS. All infrastructure is SOC 2 compliant. Annual penetration testing covers our full attack surface.
        - list [ref=e55]:
          - listitem [ref=e56]: Cloudflare Workers edge network
          - listitem [ref=e58]: Neon PostgreSQL (AWS-hosted)
          - listitem [ref=e60]: Annual penetration testing
          - listitem [ref=e62]: Uptime monitoring and alerting
