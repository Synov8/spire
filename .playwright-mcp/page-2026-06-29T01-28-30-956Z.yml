  - generic [ref=e12]:
    - text: Glossary
    - heading "Compliance terms defined for B2B SaaS" [level=1] [ref=e13]
    - paragraph [ref=e14]: Clear definitions of SOC 2, EU AI Act, and compliance automation terms. Each entry is written as a self-contained answer that AI engines can cite directly.
    - generic [ref=e15]:
      - generic [ref=e16]:
        - term [ref=e17]: SOC 2
        - definition [ref=e18]: A framework developed by the AICPA for service organizations to demonstrate controls over security, availability, processing integrity, confidentiality, and privacy through independent auditor reports.
      - generic [ref=e19]:
        - term [ref=e20]: SOC 2 Type I
        - definition [ref=e21]: A SOC 2 report that evaluates whether controls are designed appropriately to meet the relevant trust service criteria as of a specific point in time.
      - generic [ref=e22]:
        - term [ref=e23]: SOC 2 Type II
        - definition [ref=e24]: A SOC 2 report that evaluates whether controls operated effectively over a specified period, typically 6 to 12 months. Enterprise procurement teams require Type II reports.
      - generic [ref=e25]:
        - term [ref=e26]: Trust Service Criteria (TSC)
        - definition [ref=e27]: "The five categories against which SOC 2 audits evaluate controls: Security, Availability, Processing Integrity, Confidentiality, and Privacy."
      - generic [ref=e28]:
        - term [ref=e29]: Common Criteria (CC)
        - definition [ref=e30]: The baseline control set used in SOC 2 audits, covering controls that apply across all trust service criteria including CC6 (access controls), CC7 (monitoring), and CC8 (change management).
      - generic [ref=e31]:
        - term [ref=e32]: CC6.1
        - definition [ref=e33]: The SOC 2 control for logical access controls, requiring organizations to restrict access to system resources to authorized personnel based on roles and responsibilities.
      - generic [ref=e34]:
        - term [ref=e35]: CC7.1
        - definition [ref=e36]: The SOC 2 control for detection and monitoring, requiring organizations to use monitoring procedures including penetration tests and vulnerability assessments.
      - generic [ref=e37]:
        - term [ref=e38]: CC9.2
        - definition [ref=e39]: The SOC 2 control for vendor risk management, requiring organizations to assess and manage risks associated with vendors and business partners.
      - generic [ref=e40]:
        - term [ref=e41]: EU AI Act
        - definition [ref=e42]: A European Union regulation that classifies AI systems by risk level and imposes compliance obligations including transparency, risk management, and documentation requirements for providers and deployers.
      - generic [ref=e43]:
        - term [ref=e44]: Article 4 (AI Literacy)
        - definition [ref=e45]: The EU AI Act provision requiring organizations deploying AI systems to ensure their staff have sufficient AI literacy, appropriate to their role and context.
      - generic [ref=e46]:
        - term [ref=e47]: Article 50 (Transparency)
        - definition [ref=e48]: The EU AI Act provision requiring that users interacting with AI systems be informed they are interacting with AI, not a human.
      - generic [ref=e49]:
        - term [ref=e50]: GPAI (General Purpose AI)
        - definition [ref=e51]: General-purpose AI models like large language models that can perform a wide range of tasks. GPAI providers face specific obligations under the EU AI Act including transparency and copyright compliance.
      - generic [ref=e52]:
        - term [ref=e53]: ISO 27001
        - definition [ref=e54]: An international standard for information security management systems (ISMS). Certification requires a documented risk management program with continuous improvement cycles.
      - generic [ref=e55]:
        - term [ref=e56]: ISO 42001
        - definition [ref=e57]: An international standard for AI management systems published in 2024, covering AI governance, risk management, transparency, and accountability across the AI system lifecycle.
      - generic [ref=e58]:
        - term [ref=e59]: ISMS (Information Security Management System)
        - definition [ref=e60]: A systematic approach to managing sensitive information, required for ISO 27001 certification. Includes policies, risk assessments, and continuous improvement processes.
      - generic [ref=e61]:
        - term [ref=e62]: Compliance Automation
        - definition [ref=e63]: The use of software platforms that connect to infrastructure APIs to continuously collect compliance evidence, monitor controls, and map evidence to regulatory frameworks.
      - generic [ref=e64]:
        - term [ref=e65]: Continuous Monitoring
        - definition [ref=e66]: The practice of collecting compliance evidence on a recurring schedule — daily or weekly — rather than through periodic manual screenshots. Enables real-time control drift detection.
      - generic [ref=e67]:
        - term [ref=e68]: Evidence Collection
        - definition [ref=e69]: The process of gathering and storing proof that security controls are operating effectively. Can be manual (quarterly screenshots) or automated (API-based recurring collection).
      - generic [ref=e70]:
        - term [ref=e71]: Penetration Testing
        - definition [ref=e72]: A security assessment where human testers attempt to exploit vulnerabilities in applications, APIs, and infrastructure. SOC 2 auditors expect annual pen tests as CC7.1 evidence.
      - generic [ref=e73]:
        - term [ref=e74]: Vendor Risk Management (VRM)
        - definition [ref=e75]: The discipline of identifying, assessing, and monitoring risks from third-party vendors. SOC 2 criterion CC9.2 requires a documented vendor risk management program.
      - generic [ref=e76]:
        - term [ref=e77]: Security Questionnaire
        - definition [ref=e78]: A set of questions enterprise buyers send to vendors during procurement to evaluate security posture. Typically covers access controls, encryption, incident response, and compliance certifications.
      - generic [ref=e79]:
        - term [ref=e80]: GEO (Generative Engine Optimization)
        - definition [ref=e81]: The practice of structuring content so AI systems like ChatGPT, Perplexity, and Google AI Overviews cite it as a source when answering user queries. Prioritizes answer capsules, FAQ schema, and statistics-rich content.
      - generic [ref=e82]:
        - term [ref=e83]: Bridfe Letter
        - definition [ref=e84]: A letter from a SOC 2 auditor confirming that the annual re-certification audit is in progress. Used as interim compliance evidence when a current report has lapsed.
      - generic [ref=e85]:
        - term [ref=e86]: CUEC (Complementary User Entity Control)
        - definition [ref=e87]: Controls that a vendor's SOC 2 report identifies as the customer's responsibility. Customers must document how they implement each CUEC for the vendor's controls to be effective.
